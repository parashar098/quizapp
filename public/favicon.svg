<svg width="192" height="192" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#4F46E5" />
      <stop offset="50%" stopColor="#A855F7" />
      <stop offset="100%" stopColor="#EC4899" />
    </linearGradient>
  </defs>

  <!-- Background for favicon -->
  <rect width="64" height="64" fill="url(#faviconGradient)"/>

  <!-- Q Shape with checkmark -->
  <g transform="translate(32, 32) scale(0.8)">
    <!-- Q -->
    <path
      d="M -12 -12 C -16 -12 -20 -8 -20 -4 L -20 12 C -20 16 -16 20 -12 20 C -8 20 -4 16 -4 12 L -4 4 L -8 4 C -8 8 -10 12 -12 12 C -16 12 -18 8 -18 4 L -18 -4 C -18 -8 -16 -12 -12 -12"
      fill="white"
      opacity="0.95"
    />

    <!-- Checkmark -->
    <path
      d="M 4 -4 L 10 2 L 16 -6"
      stroke="white"
      strokeWidth="2.5"
      strokeLinecap="round"
      strokeLinejoin="round"
      fill="none"
      opacity="0.95"
    />
