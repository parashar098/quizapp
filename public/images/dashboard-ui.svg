<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#heroGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#4F46E5" opacity="0.15"/>
  <circle cx="1100" cy="700" r="200" fill="#EC4899" opacity="0.15"/>

  <!-- Dashboard mockup -->
  <g>
    <!-- Laptop frame -->
    <rect x="150" y="80" width="900" height="550" rx="16" fill="#0F172A" stroke="#4F46E5" stroke-width="2"/>

    <!-- Screen content -->
    <rect x="160" y="90" width="880" height="530" rx="12" fill="#1E293B"/>

    <!-- Header -->
    <rect x="160" y="90" width="880" height="60" rx="12" fill="#0F172A" opacity="0.8"/>
    <circle cx="190" cy="120" r="12" fill="#4F46E5"/>
    <text x="220" y="128" font-family="Arial" font-size="16" font-weight="bold" fill="#E2E8F0">GLA Exam Dashboard</text>

    <!-- Sidebar -->
    <rect x="160" y="150" width="150" height="470" fill="#0F172A" opacity="0.5"/>
    <rect x="165" y="170" width="140" height="32" rx="6" fill="#4F46E5" opacity="0.3"/>
    <text x="180" y="193" font-family="Arial" font-size="12" fill="#E2E8F0">Dashboard</text>
    <text x="180" y="220" font-family="Arial" font-size="12" fill="#94A3B8">Quizzes</text>
    <text x="180" y="245" font-family="Arial" font-size="12" fill="#94A3B8">Analytics</text>
    <text x="180" y="270" font-family="Arial" font-size="12" fill="#94A3B8">Students</text>

    <!-- Main content area -->
    <rect x="330" y="170" width="700" height="350" fill="#0F172A" opacity="0.4" rx="8"/>
    
    <!-- Stats cards -->
    <g>
      <!-- Card 1 -->
      <rect x="340" y="180" width="160" height="100" rx="6" fill="#4F46E5" opacity="0.2" stroke="#4F46E5" stroke-width="1"/>
      <text x="360" y="210" font-family="Arial" font-size="24" font-weight="bold" fill="#4F46E5">1,234</text>
      <text x="360" y="235" font-family="Arial" font-size="12" fill="#94A3B8">Active Quizzes</text>

      <!-- Card 2 -->
      <rect x="520" y="180" width="160" height="100" rx="6" fill="#A855F7" opacity="0.2" stroke="#A855F7" stroke-width="1"/>
      <text x="540" y="210" font-family="Arial" font-size="24" font-weight="bold" fill="#A855F7">5,678</text>
      <text x="540" y="235" font-family="Arial" font-size="12" fill="#94A3B8">Students</text>

      <!-- Card 3 -->
      <rect x="700" y="180" width="160" height="100" rx="6" fill="#EC4899" opacity="0.2" stroke="#EC4899" stroke-width="1"/>
      <text x="720" y="210" font-family="Arial" font-size="24" font-weight="bold" fill="#EC4899">94.5%</text>
      <text x="720" y="235" font-family="Arial" font-size="12" fill="#94A3B8">Success Rate</text>
    </g>

    <!-- Chart area -->
    <rect x="340" y="310" width="520" height="180" rx="6" fill="#0F172A" opacity="0.6" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.3"/>
    <text x="360" y="335" font-family="Arial" font-size="14" font-weight="bold" fill="#E2E8F0">Quiz Performance</text>
    
    <!-- Simple bar chart -->
    <g>
      <rect x="380" y="380" width="30" height="80" fill="#4F46E5" rx="4"/>
      <rect x="430" y="340" width="30" height="120" fill="#A855F7" rx="4"/>
      <rect x="480" y="300" width="30" height="160" fill="#EC4899" rx="4"/>
      <rect x="530" y="350" width="30" height="110" fill="#4F46E5" rx="4"/>
    </g>
  </g>

  <!-- Bottom bezel -->
  <rect x="150" y="630" width="900" height="30" rx="0 0 16 16" fill="#0F172A" stroke="#4F46E5" stroke-width="2"/>
  <circle cx="600" cy="645" r="6" fill="#4F46E5" opacity="0.5"/>
</svg>
