<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="1200" height="800" fill="url(#bg2)"/>

  <!-- Floating gradient circles (background) -->
  <circle cx="200" cy="150" r="200" fill="#4F46E5" opacity="0.12"/>
  <circle cx="1000" cy="650" r="250" fill="#EC4899" opacity="0.15"/>
  <circle cx="600" cy="50" r="180" fill="#A855F7" opacity="0.1"/>

  <!-- Student/User illustration -->
  <g>
    <!-- Desk -->
    <ellipse cx="600" cy="600" rx="200" ry="50" fill="#1E293B" opacity="0.5"/>

    <!-- Chair back -->
    <path d="M 550 400 Q 530 450 530 550 Q 530 620 580 650 Q 600 660 620 660 Q 640 660 660 650 Q 710 620 710 550 Q 710 450 690 400" fill="#334155" opacity="0.7"/>

    <!-- Chair seat -->
    <ellipse cx="600" cy="550" rx="80" ry="50" fill="#475569"/>

    <!-- Body -->
    <ellipse cx="600" cy="350" rx="60" ry="80" fill="#E2E8F0"/>

    <!-- Neck -->
    <rect x="590" y="280" width="20" height="30" fill="#D4A574"/>

    <!-- Head -->
    <circle cx="600" cy="260" r="35" fill="#D4A574"/>

    <!-- Hair -->
    <path d="M 565 240 Q 600 210 635 240" fill="#1F2937" stroke="#1F2937" stroke-width="8" stroke-linecap="round"/>

    <!-- Eyes -->
    <circle cx="590" cy="255" r="4" fill="#1F2937"/>
    <circle cx="610" cy="255" r="4" fill="#1F2937"/>

    <!-- Smile -->
    <path d="M 590 270 Q 600 278 610 270" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Arms -->
    <g>
      <!-- Left arm -->
      <rect x="540" y="330" width="60" height="25" rx="12" fill="#D4A574" transform="rotate(-20 570 342)"/>
      <!-- Right arm -->
      <rect x="600" y="330" width="60" height="25" rx="12" fill="#D4A574" transform="rotate(20 630 342)"/>
    </g>

    <!-- Legs -->
    <g>
      <!-- Left leg -->
      <rect x="570" y="430" width="20" height="100" rx="10" fill="#334155"/>
      <!-- Right leg -->
      <rect x="610" y="430" width="20" height="100" rx="10" fill="#334155"/>
    </g>

    <!-- Feet -->
    <ellipse cx="580" cy="535" rx="18" ry="12" fill="#1F2937"/>
    <ellipse cx="620" cy="535" rx="18" ry="12" fill="#1F2937"/>

    <!-- Laptop (in front) -->
    <rect x="380" y="380" width="240" height="150" rx="12" fill="#0F172A" stroke="#4F46E5" stroke-width="2"/>
    <rect x="390" y="390" width="220" height="120" fill="#1E293B" rx="8"/>
    
    <!-- Screen content -->
    <circle cx="420" cy="420" r="12" fill="#4F46E5" opacity="0.6"/>
    <circle cx="480" cy="420" r="12" fill="#A855F7" opacity="0.6"/>
    <circle cx="440" cy="460" r="8" fill="#EC4899" opacity="0.6"/>
    <rect x="410" y="435" width="70" height="4" fill="#4F46E5" opacity="0.4" rx="2"/>
    <rect x="410" y="475" width="50" height="4" fill="#4F46E5" opacity="0.4" rx="2"/>

    <!-- Keyboard -->
    <rect x="385" y="515" width="230" height="20" rx="4" fill="#0F172A" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- Floating UI elements (showing interaction) -->
  <g opacity="0.8">
    <!-- Card 1 -->
    <rect x="150" y="100" width="120" height="80" rx="8" fill="#4F46E5" opacity="0.2" stroke="#4F46E5" stroke-width="1"/>
    <text x="165" y="130" font-family="Arial" font-size="24" font-weight="bold" fill="#4F46E5">10K+</text>
    <text x="165" y="155" font-family="Arial" font-size="11" fill="#94A3B8">Quizzes</text>

    <!-- Card 2 -->
    <rect x="300" y="100" width="120" height="80" rx="8" fill="#A855F7" opacity="0.2" stroke="#A855F7" stroke-width="1"/>
    <text x="315" y="130" font-family="Arial" font-size="24" font-weight="bold" fill="#A855F7">5K+</text>
    <text x="315" y="155" font-family="Arial" font-size="11" fill="#94A3B8">Students</text>

    <!-- Card 3 -->
    <rect x="950" y="100" width="120" height="80" rx="8" fill="#EC4899" opacity="0.2" stroke="#EC4899" stroke-width="1"/>
    <text x="965" y="130" font-family="Arial" font-size="24" font-weight="bold" fill="#EC4899">95%</text>
    <text x="965" y="155" font-family="Arial" font-size="11" fill="#94A3B8">Success</text>
  </g>

  <!-- Glow effects -->
  <circle cx="600" cy="260" r="100" fill="none" stroke="#4F46E5" stroke-width="2" opacity="0.1" stroke-dasharray="5,5"/>
</svg>
