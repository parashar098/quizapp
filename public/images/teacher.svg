<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg4)"/>

  <!-- Floating circles -->
  <circle cx="1050" cy="150" r="180" fill="#4F46E5" opacity="0.12"/>
  <circle cx="150" cy="700" r="200" fill="#EC4899" opacity="0.1"/>

  <!-- Teacher at whiteboard -->
  <g>
    <!-- Whiteboard -->
    <rect x="600" y="100" width="500" height="400" rx="12" fill="#E2E8F0" stroke="#4F46E5" stroke-width="2"/>

    <!-- Content on whiteboard -->
    <g>
      <!-- Heading -->
      <text x="630" y="150" font-family="Arial" font-size="24" font-weight="bold" fill="#1F2937">Quiz Dashboard</text>

      <!-- Chart area -->
      <g>
        <!-- Y-axis -->
        <line x1="620" y1="320" x2="620" y2="400" stroke="#1F2937" stroke-width="2"/>
        <!-- X-axis -->
        <line x1="620" y1="400" x2="1050" y2="400" stroke="#1F2937" stroke-width="2"/>

        <!-- Bars -->
        <rect x="650" y="350" width="30" height="50" fill="#4F46E5" rx="3"/>
        <rect x="710" y="300" width="30" height="100" fill="#A855F7" rx="3"/>
        <rect x="770" y="280" width="30" height="120" fill="#EC4899" rx="3"/>
        <rect x="830" y="330" width="30" height="70" fill="#4F46E5" rx="3"/>
        <rect x="890" y="290" width="30" height="110" fill="#A855F7" rx="3"/>

        <!-- Labels -->
        <text x="655" y="425" font-family="Arial" font-size="10" fill="#1F2937">Q1</text>
        <text x="715" y="425" font-family="Arial" font-size="10" fill="#1F2937">Q2</text>
        <text x="775" y="425" font-family="Arial" font-size="10" fill="#1F2937">Q3</text>
        <text x="835" y="425" font-family="Arial" font-size="10" fill="#1F2937">Q4</text>
        <text x="895" y="425" font-family="Arial" font-size="10" fill="#1F2937">Q5</text>
      </g>

      <!-- Metrics -->
      <g>
        <text x="1000" y="180" font-family="Arial" font-size="12" font-weight="bold" fill="#1F2937">Metrics:</text>
        <text x="1000" y="205" font-family="Arial" font-size="10" fill="#475569">✓ Completion: 95%</text>
        <text x="1000" y="225" font-family="Arial" font-size="10" fill="#475569">✓ Avg Score: 87%</text>
        <text x="1000" y="245" font-family="Arial" font-size="10" fill="#475569">✓ Engagement: High</text>
      </g>
    </g>
  </g>

  <!-- Teacher -->
  <g transform="translate(150, 250)">
    <!-- Body -->
    <ellipse x="60" y="100" rx="40" ry="50" fill="#E2E8F0"/>

    <!-- Neck -->
    <rect x="55" y="65" width="10" height="20" fill="#D4A574"/>

    <!-- Head -->
    <circle x="60" y="50" r="28" fill="#D4A574"/>

    <!-- Hair -->
    <path d="M 32 45 Q 60 20 88 45" fill="#5D4E37" stroke="#5D4E37" stroke-width="6" stroke-linecap="round"/>

    <!-- Face -->
    <circle cx="52" cy="48" r="2" fill="#1F2937"/>
    <circle cx="68" cy="48" r="2" fill="#1F2937"/>
    <path d="M 55 58 Q 60 63 65 58" stroke="#1F2937" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Arms (pointing at board) -->
    <g>
      <!-- Left arm pointing -->
      <line x1="20" y1="110" x2="0" y2="90" stroke="#D4A574" stroke-width="12" stroke-linecap="round"/>
      <!-- Right arm -->
      <line x1="100" y1="110" x2="120" y2="120" stroke="#D4A574" stroke-width="12" stroke-linecap="round"/>
    </g>

    <!-- Legs -->
    <g>
      <rect x="45" y="150" width="12" height="80" rx="6" fill="#334155"/>
      <rect x="63" y="150" width="12" height="80" rx="6" fill="#334155"/>
    </g>

    <!-- Feet -->
    <ellipse x="51" y="235" rx="12" ry="8" fill="#1F2937"/>
    <ellipse x="69" y="235" rx="12" ry="8" fill="#1F2937"/>
  </g>

  <!-- Control panel (in teacher's hand area) -->
  <g>
    <!-- Panel -->
    <rect x="80" y="100" width="160" height="120" rx="10" fill="#0F172A" stroke="#4F46E5" stroke-width="2"/>

    <!-- Buttons -->
    <g>
      <!-- Button 1 -->
      <rect x="100" y="120" width="120" height="28" rx="6" fill="#4F46E5" opacity="0.8"/>
      <text x="115" y="142" font-family="Arial" font-size="11" font-weight="bold" fill="white">Start Quiz</text>

      <!-- Button 2 -->
      <rect x="100" y="160" width="120" height="28" rx="6" fill="#A855F7" opacity="0.6" stroke="#A855F7" stroke-width="1"/>
      <text x="120" y="182" font-family="Arial" font-size="11" fill="#E2E8F0">Settings</text>
    </g>
  </g>

  <!-- Student responses visualization -->
  <g>
    <!-- Left panel -->
    <rect x="50" y="500" width="330" height="250" rx="12" fill="#0F172A" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.3"/>
    
    <!-- Title -->
    <text x="70" y="535" font-family="Arial" font-size="14" font-weight="bold" fill="#E2E8F0">Student Responses</text>

    <!-- Response indicators -->
    <g>
      <!-- Student 1 -->
      <circle cx="85" cy="575" r="8" fill="#10B981"/>
      <text x="110" y="580" font-family="Arial" font-size="12" fill="#E2E8F0">Alice - Answered</text>
      <text x="110" y="595" font-family="Arial" font-size="10" fill="#94A3B8">Score: 95%</text>

      <!-- Student 2 -->
      <circle cx="85" cy="630" r="8" fill="#10B981"/>
      <text x="110" y="635" font-family="Arial" font-size="12" fill="#E2E8F0">Bob - Answered</text>
      <text x="110" y="650" font-family="Arial" font-size="10" fill="#94A3B8">Score: 87%</text>

      <!-- Student 3 -->
      <circle cx="85" cy="685" r="8" fill="#3B82F6"/>
      <text x="110" y="690" font-family="Arial" font-size="12" fill="#E2E8F0">Carol - In Progress</text>
      <text x="110" y="705" font-family="Arial" font-size="10" fill="#94A3B8">2 mins left</text>
    </g>
  </g>

  <!-- Analytics summary -->
  <g>
    <!-- Right panel -->
    <rect x="820" y="500" width="330" height="250" rx="12" fill="#0F172A" stroke="#EC4899" stroke-width="2" stroke-opacity="0.3"/>
    
    <!-- Title -->
    <text x="840" y="535" font-family="Arial" font-size="14" font-weight="bold" fill="#E2E8F0">Quick Analytics</text>

    <!-- Stats -->
    <g>
      <rect x="840" y="560" width="130" height="60" rx="6" fill="#4F46E5" opacity="0.15"/>
      <text x="857" y="585" font-family="Arial" font-size="18" font-weight="bold" fill="#4F46E5">3/3</text>
      <text x="857" y="605" font-family="Arial" font-size="10" fill="#94A3B8">Submissions</text>

      <rect x="990" y="560" width="130" height="60" rx="6" fill="#A855F7" opacity="0.15"/>
      <text x="1007" y="585" font-family="Arial" font-size="18" font-weight="bold" fill="#A855F7">89%</text>
      <text x="1007" y="605" font-family="Arial" font-size="10" fill="#94A3B8">Avg Score</text>

      <rect x="840" y="640" width="280" height="40" rx="6" fill="#EC4899" opacity="0.15"/>
      <text x="857" y="665" font-family="Arial" font-size="11" fill="#E2E8F0">Time Left: 8 mins 24 secs</text>
    </g>
  </g>
</svg>
